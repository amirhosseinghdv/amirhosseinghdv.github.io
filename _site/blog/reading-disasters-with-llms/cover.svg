<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="A five-stage pipeline turning scattered documents into structured data">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8fb"/>
      <stop offset="1" stop-color="#e4edf5"/>
    </linearGradient>
    <linearGradient id="node2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a86c8"/>
      <stop offset="1" stop-color="#0066b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- messy documents flowing in on the left -->
  <g>
    <g transform="rotate(-12 140 200)">
      <rect x="92" y="160" width="96" height="124" rx="6" fill="#ffffff" stroke="#9fb3c6" stroke-width="2.5"/>
      <line x1="106" y1="184" x2="174" y2="184" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="106" y1="204" x2="174" y2="204" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="106" y1="224" x2="150" y2="224" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="rotate(7 150 330)">
      <rect x="104" y="300" width="96" height="124" rx="6" fill="#ffffff" stroke="#9fb3c6" stroke-width="2.5"/>
      <line x1="118" y1="324" x2="186" y2="324" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="118" y1="344" x2="186" y2="344" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="118" y1="364" x2="158" y2="364" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="rotate(-4 120 460)">
      <rect x="80" y="430" width="96" height="124" rx="6" fill="#ffffff" stroke="#9fb3c6" stroke-width="2.5"/>
      <line x1="94" y1="454" x2="162" y2="454" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="94" y1="474" x2="162" y2="474" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
      <line x1="94" y1="494" x2="134" y2="494" stroke="#c4d3e0" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- pipeline spine -->
  <line x1="250" y1="315" x2="980" y2="315" stroke="#b9cadb" stroke-width="6" stroke-linecap="round"/>

  <!-- five stages -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" text-anchor="middle">
    <!-- Ingest -->
    <circle cx="320" cy="315" r="46" fill="url(#node2)"/>
    <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M320 296 v26 M309 312 l11 11 l11 -11"/>
    </g>
    <text x="320" y="392" font-size="26" font-weight="600" fill="#37393c">Ingest</text>

    <!-- Filter -->
    <circle cx="470" cy="315" r="46" fill="url(#node2)"/>
    <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M451 299 h38 l-15 18 v16 l-8 5 v-21 z"/>
    </g>
    <text x="470" y="392" font-size="26" font-weight="600" fill="#37393c">Filter</text>

    <!-- Extract -->
    <circle cx="615" cy="315" r="52" fill="#024c86"/>
    <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="596" y="297" width="38" height="36" rx="5"/>
      <path d="M605 309 h20 M605 321 h14"/>
    </g>
    <text x="615" y="398" font-size="27" font-weight="700" fill="#024c86">Extract</text>
    <text x="615" y="252" font-size="15" fill="#0066b2" font-style="italic">LLM, constrained</text>

    <!-- Resolve -->
    <circle cx="760" cy="315" r="46" fill="url(#node2)"/>
    <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round">
      <circle cx="749" cy="315" r="9"/>
      <circle cx="771" cy="315" r="9"/>
    </g>
    <text x="760" y="392" font-size="26" font-weight="600" fill="#37393c">Resolve</text>

    <!-- Serve -->
    <circle cx="905" cy="315" r="46" fill="url(#node2)"/>
    <g stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M889 326 a16 16 0 0 1 32 0"/>
      <path d="M896 315 a9 9 0 0 1 18 0"/>
      <circle cx="905" cy="326" r="2.5" fill="#ffffff" stroke="none"/>
    </g>
    <text x="905" y="392" font-size="26" font-weight="600" fill="#37393c">Serve</text>
  </g>

  <!-- structured output on the right -->
  <g>
    <rect x="1010" y="250" width="150" height="130" rx="8" fill="#ffffff" stroke="#0066b2" stroke-width="3"/>
    <g font-family="monospace" font-size="15" fill="#37393c">
      <rect x="1026" y="268" width="10" height="10" fill="#0066b2"/>
      <text x="1044" y="277">event</text>
      <rect x="1026" y="292" width="10" height="10" fill="#3a86c8"/>
      <text x="1044" y="301">family: B</text>
      <rect x="1026" y="316" width="10" height="10" fill="#3a86c8"/>
      <text x="1044" y="325">service</text>
      <rect x="1026" y="340" width="10" height="10" fill="#0066b2"/>
      <text x="1044" y="349">impact</text>
    </g>
  </g>

  <!-- arrowheads along spine -->
  <g fill="#8aa2b8">
    <path d="M392 315 l-12 -6 v12 z"/>
    <path d="M538 315 l-12 -6 v12 z"/>
    <path d="M690 315 l-12 -6 v12 z"/>
    <path d="M832 315 l-12 -6 v12 z"/>
    <path d="M985 315 l-12 -6 v12 z"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The chain of mechanisms by which a flood disrupts healthcare, over a landscape of hills and water">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4fa"/>
      <stop offset="1" stop-color="#dbe8f3"/>
    </linearGradient>
    <linearGradient id="chainnode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a86c8"/>
      <stop offset="1" stop-color="#0066b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky3)"/>

  <!-- rolling welsh hills -->
  <path d="M0 470 C 180 420, 320 470, 480 452 C 640 434, 760 472, 1200 446 L 1200 630 L 0 630 Z" fill="#d2e0ec"/>
  <path d="M0 520 C 220 482, 420 524, 640 508 C 820 494, 980 520, 1200 500 L 1200 630 L 0 630 Z" fill="#bcd2e6"/>

  <!-- water band -->
  <path d="M0 566 C 240 548, 480 580, 720 566 C 920 554, 1040 578, 1200 562 L 1200 630 L 0 630 Z" fill="#0066b2"/>
  <g stroke="#bcdcf2" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M160 592 q 28 -10 56 0 t 56 0"/>
    <path d="M720 592 q 28 -10 56 0 t 56 0"/>
  </g>

  <!-- rain -->
  <g stroke="#9cc0e0" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <line x1="150" y1="70" x2="138" y2="104"/>
    <line x1="220" y1="58" x2="208" y2="92"/>
    <line x1="300" y1="74" x2="288" y2="108"/>
    <line x1="980" y1="64" x2="968" y2="98"/>
    <line x1="1050" y1="78" x2="1038" y2="112"/>
  </g>

  <!-- mechanism chain -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" text-anchor="middle">
    <line x1="190" y1="300" x2="1010" y2="300" stroke="#7a8387" stroke-width="5" stroke-linecap="round"/>

    <!-- node A -->
    <circle cx="200" cy="300" r="58" fill="url(#chainnode)"/>
    <text x="200" y="288" font-size="40" font-weight="700" fill="#ffffff">A</text>
    <text x="200" y="316" font-size="15" fill="#dceaf6">hazard</text>
    <text x="200" y="392" font-size="20" font-weight="600" fill="#37393c">trigger</text>

    <!-- node B -->
    <circle cx="402" cy="300" r="58" fill="url(#chainnode)"/>
    <text x="402" y="288" font-size="40" font-weight="700" fill="#ffffff">B</text>
    <text x="402" y="316" font-size="15" fill="#dceaf6">lifelines</text>
    <text x="402" y="392" font-size="20" font-weight="600" fill="#37393c">infrastructure</text>

    <!-- node C -->
    <circle cx="604" cy="300" r="58" fill="url(#chainnode)"/>
    <text x="604" y="288" font-size="40" font-weight="700" fill="#ffffff">C</text>
    <text x="604" y="316" font-size="15" fill="#dceaf6">facility</text>
    <text x="604" y="392" font-size="20" font-weight="600" fill="#37393c">and workforce</text>

    <!-- node D -->
    <circle cx="806" cy="300" r="58" fill="url(#chainnode)"/>
    <text x="806" y="288" font-size="40" font-weight="700" fill="#ffffff">D</text>
    <text x="806" y="316" font-size="15" fill="#dceaf6">access</text>
    <text x="806" y="392" font-size="20" font-weight="600" fill="#37393c">demand side</text>

    <!-- node X -->
    <circle cx="1008" cy="300" r="58" fill="#024c86"/>
    <text x="1008" y="288" font-size="40" font-weight="700" fill="#ffffff">X</text>
    <text x="1008" y="316" font-size="15" fill="#cfe0ef">spread</text>
    <text x="1008" y="392" font-size="20" font-weight="600" fill="#024c86">cascades</text>

    <!-- arrowheads -->
    <g fill="#5f7488">
      <path d="M318 300 l-13 -7 v14 z"/>
      <path d="M520 300 l-13 -7 v14 z"/>
      <path d="M722 300 l-13 -7 v14 z"/>
      <path d="M924 300 l-13 -7 v14 z"/>
    </g>
  </g>

  <!-- small medical cross marker -->
  <g transform="translate(604 168)">
    <circle r="30" fill="#ffffff" stroke="#0066b2" stroke-width="3"/>
    <rect x="-5" y="-16" width="10" height="32" fill="#0066b2"/>
    <rect x="-16" y="-5" width="32" height="10" fill="#0066b2"/>
  </g>
</svg>
